name: Build & Release

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - name: 1.20.4
            branch: 1.20.4
            java: 21
          - name: 1.21.11
            branch: main
            java: 21
          - name: 26.1.2
            branch: 26.1
            java: 25
          - name: 26.2
            branch: 26
            java: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version.branch }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.version.java }}

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Build for ${{ matrix.version.name }}
        run: ./gradlew build

      - name: Rename JARs with MC version
        run: |
          cd build/libs
          for jar in *.jar; do
            mv "$jar" "invistags-mc${{ matrix.version.name }}-${jar#invistags-}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: invistags-mc${{ matrix.version.name }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release tag
        id: tag
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ steps.tag.outputs.tag }}
          body: |
            Automated build for MC versions:
            - 1.20.4
            - 1.21.11
            - 26.1.2
            - 26.2
          files: artifacts/**/*.jar
