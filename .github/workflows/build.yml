name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - name: 1.20.4
            branch: 1.20.4
            java: 21
          - name: 1.21.11
            branch: main
            java: 21
          - name: 26.2
            branch: 26
            java: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.version.branch }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.version.java }}

      - uses: gradle/actions/setup-gradle@v3

      - run: chmod +x gradlew

      - name: Build for ${{ matrix.version.name }}
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: invistags-mc${{ matrix.version.name }}
          path: build/libs/*.jar
          if-no-files-found: error
